<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiterweb</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="content-box">
        <header class="main-header">
            <img 
                src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo.png"
                alt="USP"
            />
            <img 
                src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo-texto.png"
                alt="Universidade de São Paulo"
            />
        </header>

        <div class="solid-br"></div>

        <form class="login-form">
            <div class="form-row">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-row">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <input type="submit" value="Login" class="login-btn">
        </form>
    </main>
</body>

</html>
